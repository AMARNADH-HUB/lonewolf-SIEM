services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lonewolf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  server:
    build:
      context: ..
      dockerfile: deploy/server.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: ..
      dockerfile: deploy/dashboard.Dockerfile
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  pgdata:
